# docker-compose.yml — full camera inference + overlay stack
#
# Build order (run once):
#   podman build -t ros2-fedora-base:latest    ros2-fedora-base/src/
#   podman build -t ros2-inference:latest      ros2-inference/src/
#   podman build -t ros2-rosbridge:latest      ros2-rosbridge/src/
#   podman build -t ros2-broker:latest         ros2-broker/src/      # optional
#   podman build -t camera-gateway-rtsp:latest camera-gateway-rtsp/src/
#
# Start:  docker compose up -d
# Stop:   docker compose down
#
# Architecture:
#
#   USB camera
#       │
#       ▼
#   camera-gateway-rtsp (MediaMTX)
#       │
#       ├── WebRTC :8889 ──────────────────────────────► browser <video>
#       │
#       └── RTSP :8554 ──► ros2-inference (YOLOv11)
#                               │ /detections topic
#                               ▼
#                          ros2-rosbridge :9090 ─────────► browser overlay
#
# The browser opens viewer/src/index.html and connects to both endpoints.

version: "3.9"

services:

  # ── Camera gateway ──────────────────────────────────────────────────────────
  camera-gateway-rtsp:
    image: camera-gateway-rtsp:latest
    restart: unless-stopped
    devices:
      - /dev/video0:/dev/video0        # adjust to your camera device
    security_opt:
      - label=disable
    group_add:
      - video
    ports:
      - "8554:8554"        # RTSP
      - "8888:8888"        # HLS
      - "8889:8889"        # WebRTC
      - "8189:8189/udp"    # WebRTC ICE
    environment:
      MTX_WEBRTCADDITIONALHOSTS: "192.168.1.41"   # ← set to your host LAN IP
      RTSP_NAME: "stream"
      CAM_FRAMERATE: "30"
      CAM_RESOLUTION: "1280x720"
      CAM_VIDEO_BITRATE: "2000k"
      CAM_PRESET: "ultrafast"
      CAM_TUNE: "zerolatency"

  # ── YOLOv11 inference ────────────────────────────────────────────────────────
  ros2-inference:
    image: ros2-inference:latest
    restart: unless-stopped
    network_mode: host      # required for ROS2 DDS discovery
    depends_on:
      - camera-gateway-rtsp
    environment:
      RTSP_URL: "rtsp://127.0.0.1:8554/stream"
      DETECTION_TOPIC: "/detections"
      YOLO_MODEL: "yolo11n.pt"          # n=fastest, x=most accurate
      CONFIDENCE_THRESHOLD: "0.4"
      INFERENCE_WIDTH: "640"
      INFERENCE_HEIGHT: "640"
      TARGET_FPS: "15"
      DEVICE: "auto"                    # auto-detects CUDA
      VERBOSE: "false"
      ROS_DOMAIN_ID: "0"
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── rosbridge WebSocket server ───────────────────────────────────────────────
  ros2-rosbridge:
    image: ros2-rosbridge:latest
    restart: unless-stopped
    network_mode: host
    ports:
      - "9090:9090"
    environment:
      ROSBRIDGE_PORT: "9090"
      ROS_DOMAIN_ID: "0"

  # ── Optional: topic health monitor ───────────────────────────────────────────
  # ros2-broker:
  #   image: ros2-broker:latest
  #   restart: unless-stopped
  #   network_mode: host
  #   environment:
  #     CAMERA_TOPICS: "/detections"
  #     STALE_TIMEOUT: "10"
  #     ROS_DOMAIN_ID: "0"
