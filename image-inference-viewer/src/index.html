<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 10px 20px;
      background: #111;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #fff; }

    .status-row { display: flex; gap: 12px; margin-left: auto; align-items: center; }

    .badge {
      font-size: 0.72rem;
      padding: 3px 10px;
      border-radius: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge.ok    { background: #1a3a1a; color: #4caf50; border: 1px solid #2e5f2e; }
    .badge.warn  { background: #3a2a00; color: #ffb300; border: 1px solid #5c4400; }
    .badge.error { background: #3a1a1a; color: #ef5350; border: 1px solid #5c2a2a; }

    .main {
      flex: 1;
      display: flex;
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .video-container {
      flex: 1;
      position: relative;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      min-width: 0;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .sidebar {
      width: 280px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 14px;
    }

    .card h2 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 10px;
    }

    .config-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .config-row label {
      font-size: 0.78rem;
      color: #888;
    }

    .config-row input {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 0.82rem;
      width: 100%;
    }

    button {
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      font-weight: 600;
    }
    button:hover { background: #1976d2; }
    button.danger { background: #b71c1c; }
    button.danger:hover { background: #c62828; }

    #detection-list {
      font-size: 0.78rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 280px;
      overflow-y: auto;
    }

    .det-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      background: #1a1a1a;
      border-radius: 4px;
      border-left: 3px solid;
    }

    .det-label { color: #e0e0e0; font-weight: 600; }
    .det-conf  { color: #888; }

    #stats {
      font-size: 0.78rem;
      color: #666;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #stats span { color: #aaa; }
  </style>
</head>
<body>

<header>
  <h1>Camera Viewer</h1>
  <div class="status-row">
    <span id="video-badge" class="badge warn">VIDEO: connecting</span>
    <span id="ws-badge"    class="badge warn">ROS: connecting</span>
    <span id="fps-badge"   class="badge ok"  >0 det/s</span>
  </div>
</header>

<div class="main">
  <!-- Video + overlay canvas -->
  <div class="video-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card">
      <h2>Connection</h2>
      <div class="config-row">
        <label>MediaMTX host (WebRTC)</label>
        <input id="mtx-host" type="text" value="" placeholder="e.g. 192.168.1.41" />
        <label>MediaMTX WebRTC port</label>
        <input id="mtx-port" type="text" value="8889" />
        <label>Stream name</label>
        <input id="stream-name" type="text" value="stream" />
        <label>rosbridge WebSocket</label>
        <input id="ws-url" type="text" value="" placeholder="ws://192.168.1.41:9099" />
      </div>
      <button onclick="connect()">Connect</button>
      <button class="danger" onclick="disconnect()" style="margin-top:6px">Disconnect</button>
    </div>

    <div class="card">
      <h2>Live detections</h2>
      <div id="detection-list"><span style="color:#444">No detections yet</span></div>
    </div>

    <div class="card">
      <h2>Stats</h2>
      <div id="stats">
        <div>Detections/s: <span id="stat-dps">0</span></div>
        <div>Last count:   <span id="stat-count">0</span></div>
        <div>Video state:  <span id="stat-video">-</span></div>
      </div>
    </div>

  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let pc        = null;   // RTCPeerConnection
let ros       = null;   // roslibjs ROSLIB.Ros
let listener  = null;   // ROSLIB.Topic
let detections = [];    // latest detections array
let detCount  = 0;
let detTs     = Date.now();

const video   = document.getElementById('video');
const canvas  = document.getElementById('overlay');
const ctx     = canvas.getContext('2d');

// Colour palette for class labels
const COLOURS = [
  '#ef5350','#ec407a','#ab47bc','#7e57c2','#42a5f5',
  '#26c6da','#26a69a','#66bb6a','#ffca28','#ffa726',
];
function classColour(label) {
  let h = 0;
  for (let i = 0; i < label.length; i++) h = (h * 31 + label.charCodeAt(i)) & 0xffff;
  return COLOURS[h % COLOURS.length];
}

// ── Utilities ──────────────────────────────────────────────────────────────
function setBadge(id, text, state) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'badge ' + state;
}

// Pre-fill ws-url from current page host if empty
window.addEventListener('load', () => {
  const host = location.hostname || '192.168.1.41';
  if (!document.getElementById('mtx-host').value)
    document.getElementById('mtx-host').value = host;
  if (!document.getElementById('ws-url').value)
    document.getElementById('ws-url').value = `ws://${host}:9099`;
});

// ── WebRTC (MediaMTX) ──────────────────────────────────────────────────────
async function connectWebRTC() {
  const host   = document.getElementById('mtx-host').value.trim();
  const port   = document.getElementById('mtx-port').value.trim();
  const stream = document.getElementById('stream-name').value.trim();

  if (!host) { alert('Enter the MediaMTX host first'); return; }

  setBadge('video-badge', 'VIDEO: connecting ...', 'warn');

  if (pc) { pc.close(); pc = null; }

  pc = new RTCPeerConnection({ iceServers: [] });

  pc.addTransceiver('video', { direction: 'recvonly' });
  pc.addTransceiver('audio', { direction: 'recvonly' });

  pc.ontrack = (ev) => {
    if (ev.track.kind === 'video') {
      video.srcObject = ev.streams[0];
      setBadge('video-badge', 'VIDEO: live', 'ok');
      document.getElementById('stat-video').textContent = 'playing';
    }
  };

  pc.oniceconnectionstatechange = () => {
    const s = pc.iceConnectionState;
    if (s === 'failed' || s === 'disconnected') {
      setBadge('video-badge', 'VIDEO: lost', 'error');
      document.getElementById('stat-video').textContent = s;
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Wait for ICE gathering
  await new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') { resolve(); return; }
    pc.addEventListener('icegatheringstatechange', () => {
      if (pc.iceGatheringState === 'complete') resolve();
    });
    setTimeout(resolve, 3000); // fallback
  });

  const whepUrl = `http://${host}:${port}/${stream}/whep`;
  const resp = await fetch(whepUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/sdp' },
    body: pc.localDescription.sdp,
  });

  if (!resp.ok) {
    setBadge('video-badge', `VIDEO: error ${resp.status}`, 'error');
    console.error('WHEP error', resp.status, await resp.text());
    return;
  }

  const answer = await resp.text();
  await pc.setRemoteDescription({ type: 'answer', sdp: answer });
}

// ── rosbridge ──────────────────────────────────────────────────────────────
function connectRosbridge() {
  const wsUrl = document.getElementById('ws-url').value.trim();
  if (!wsUrl) { alert('Enter the rosbridge WebSocket URL first'); return; }

  setBadge('ws-badge', 'ROS: connecting ...', 'warn');

  if (ros) { ros.close(); ros = null; listener = null; }

  // Inline minimal roslibjs — no CDN dependency
  // We use a native WebSocket and parse the rosbridge JSON protocol directly
  const ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    setBadge('ws-badge', 'ROS: connected', 'ok');
    // Subscribe to /detections topic
    ws.send(JSON.stringify({
      op: 'subscribe',
      topic: '/detections',
      type: 'vision_msgs/msg/Detection2DArray',
    }));
  };
  ws.onclose  = () => setBadge('ws-badge', 'ROS: disconnected', 'error');
  ws.onerror  = () => setBadge('ws-badge', 'ROS: error', 'error');
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.op === 'publish' && msg.topic === '/detections') {
        handleDetections(msg.msg);
      }
    } catch(e) { console.warn('ws parse error', e); }
  };
  ros = ws;
}

// ── Detection handling ─────────────────────────────────────────────────────
function handleDetections(msg) {
  detections = msg.detections || [];
  detCount++;

  // Update rate counter every second
  const now = Date.now();
  if (now - detTs >= 1000) {
    setBadge('fps-badge', `${detCount} det/s`, detCount > 0 ? 'ok' : 'warn');
    document.getElementById('stat-dps').textContent = detCount;
    detCount = 0;
    detTs = now;
  }

  document.getElementById('stat-count').textContent = detections.length;
  updateDetectionList(detections);
}

function updateDetectionList(dets) {
  const el = document.getElementById('detection-list');
  if (!dets.length) {
    el.innerHTML = '<span style="color:#444">No detections</span>';
    return;
  }
  el.innerHTML = dets.map(d => {
    const label = d.results?.[0]?.hypothesis?.class_id ?? '?';
    const conf  = ((d.results?.[0]?.hypothesis?.score ?? 0) * 100).toFixed(0);
    const col   = classColour(label);
    return `<div class="det-item" style="border-color:${col}">
      <span class="det-label">${label}</span>
      <span class="det-conf">${conf}%</span>
    </div>`;
  }).join('');
}

// ── Canvas overlay ─────────────────────────────────────────────────────────
function resizeCanvas() {
  const rect = video.getBoundingClientRect();
  if (canvas.width !== rect.width || canvas.height !== rect.height) {
    canvas.width  = rect.width;
    canvas.height = rect.height;
  }
}

function drawOverlay() {
  requestAnimationFrame(drawOverlay);
  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!detections.length) return;

  // Map from original frame coords to displayed video coords
  // The video element uses object-fit:contain, so we need the actual
  // rendered dimensions.
  const vw = video.videoWidth  || canvas.width;
  const vh = video.videoHeight || canvas.height;
  const cw = canvas.width;
  const ch = canvas.height;

  const scale = Math.min(cw / vw, ch / vh);
  const offX  = (cw - vw * scale) / 2;
  const offY  = (ch - vh * scale) / 2;

  ctx.lineWidth   = 2;
  ctx.font        = 'bold 13px system-ui';
  ctx.textBaseline = 'top';

  for (const det of detections) {
    const label = det.results?.[0]?.hypothesis?.class_id ?? '?';
    const conf  = det.results?.[0]?.hypothesis?.score ?? 0;
    const bx    = det.bbox?.center?.position?.x ?? 0;
    const by    = det.bbox?.center?.position?.y ?? 0;
    const bw    = det.bbox?.size_x ?? 0;
    const bh    = det.bbox?.size_y ?? 0;

    const x = offX + (bx - bw / 2) * scale;
    const y = offY + (by - bh / 2) * scale;
    const w = bw * scale;
    const h = bh * scale;

    const col = classColour(label);

    // Box
    ctx.strokeStyle = col;
    ctx.strokeRect(x, y, w, h);

    // Label background
    const text = `${label} ${(conf * 100).toFixed(0)}%`;
    const tw   = ctx.measureText(text).width + 8;
    ctx.fillStyle = col;
    ctx.fillRect(x, y - 20, tw, 20);

    // Label text
    ctx.fillStyle = '#fff';
    ctx.fillText(text, x + 4, y - 18);
  }
}

// ── Connect / disconnect ───────────────────────────────────────────────────
async function connect() {
  await connectWebRTC();
  connectRosbridge();
}

function disconnect() {
  if (pc)  { pc.close();  pc  = null; }
  if (ros) { ros.close(); ros = null; }
  video.srcObject = null;
  detections = [];
  setBadge('video-badge', 'VIDEO: disconnected', 'error');
  setBadge('ws-badge',    'ROS: disconnected',   'error');
}

// Start the canvas render loop
drawOverlay();
</script>
</body>
</html>
